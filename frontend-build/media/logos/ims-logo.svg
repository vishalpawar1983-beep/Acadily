<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="imsBg" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6a4cff"/>
      <stop offset="0.55" stop-color="#8b5cff"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="imsCap" x1="20" y1="40" x2="100" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f3e8ff"/>
    </linearGradient>
    <filter id="imsShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#2a1a6a" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect x="4" y="4" width="112" height="112" rx="28" fill="url(#imsBg)"/>

  <!-- Decorative arc -->
  <path d="M14 82 Q60 120 106 82" stroke="rgba(255,255,255,0.18)" stroke-width="2" fill="none"/>
  <circle cx="22" cy="28" r="3" fill="rgba(255,255,255,0.35)"/>
  <circle cx="96" cy="24" r="2" fill="rgba(255,255,255,0.5)"/>

  <!-- Graduation cap mortarboard -->
  <g filter="url(#imsShadow)">
    <path d="M60 32 L22 50 L60 68 L98 50 Z" fill="url(#imsCap)"/>
    <!-- Cap base -->
    <path d="M38 58 L38 74 Q38 82 60 82 Q82 82 82 74 L82 58 L60 68 Z" fill="url(#imsCap)" opacity="0.92"/>
    <!-- Tassel cord -->
    <path d="M92 54 L92 72" stroke="#fde68a" stroke-width="2.2" stroke-linecap="round"/>
    <circle cx="92" cy="76" r="3.2" fill="#fbbf24"/>
  </g>

  <!-- IMS text -->
  <text x="60" y="102" text-anchor="middle" fill="#ffffff" font-family="'Segoe UI', system-ui, sans-serif" font-size="14" font-weight="800" letter-spacing="2">IMS</text>
</svg>
