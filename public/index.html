<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flex Academy</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
    .card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); text-align: center; max-width: 520px; width: 90%; }
    h1 { margin: 0 0 0.5rem; color: #1a1a2e; }
    .subtitle { color: #666; margin: 0 0 1.5rem; }
    .status { margin: 0.5rem 0; padding: 0.6rem 1rem; border-radius: 8px; font-size: 0.85rem; text-align: left; }
    .ok { background: #e8f5e9; color: #2e7d32; }
    .err { background: #ffebee; color: #c62828; }
    .loading { background: #fff3e0; color: #e65100; }
    .links { margin-top: 1.5rem; display: flex; gap: 0.75rem; justify-content: center; flex-wrap: wrap; }
    .links a { padding: 0.4rem 0.8rem; background: #f0f0f0; border-radius: 6px; text-decoration: none; color: #333; font-size: 0.8rem; }
    .links a:hover { background: #e0e0e0; }
    .section { margin-top: 1rem; font-size: 0.75rem; color: #999; text-transform: uppercase; letter-spacing: 0.05em; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Flex Academy</h1>
    <p class="subtitle">Multi-tenant Institute & Salon Management Platform</p>

    <div class="status loading" id="health">Checking health...</div>
    <div class="status loading" id="ready">Checking readiness...</div>
    <div class="status loading" id="ews">Checking EWS...</div>

    <div class="section">Endpoints</div>
    <div class="links">
      <a href="/health">/health</a>
      <a href="/ready">/ready</a>
      <a href="/metrics">/metrics</a>
      <a href="/ews/alerts">/ews/alerts</a>
      <a href="/api/v1/ping">/api/v1/ping</a>
    </div>
  </div>
  <script>
    function $(id) { return document.getElementById(id); }
    function show(id, ok, text) {
      $(id).textContent = text;
      $(id).className = 'status ' + (ok ? 'ok' : 'err');
    }

    fetch('/health').then(r => r.json()).then(d => {
      show('health', true, 'Health: ' + d.status + ' | Uptime: ' + Math.round(d.uptime) + 's | v' + (d.version || '1.0.0'));
    }).catch(() => show('health', false, 'Health: unreachable'));

    fetch('/ready').then(r => r.json()).then(d => {
      const dbOk = d.checks?.database?.status === 'up';
      show('ready', d.status !== 'down', 'Ready: ' + d.status + ' | DB: ' + (dbOk ? 'connected' : 'down') + ' | Heap: ' + (d.checks?.memory?.heapUsedMB || '?') + 'MB');
    }).catch(() => show('ready', false, 'Readiness: unreachable'));

    fetch('/ews/alerts').then(r => r.json()).then(d => {
      const count = d.data.activeAlerts.length;
      show('ews', count === 0, 'EWS: ' + (count === 0 ? 'All clear' : count + ' active alert(s)') + ' | Rules: ' + d.data.ruleCount);
    }).catch(() => show('ews', false, 'EWS: unreachable'));
  </script>
</body>
</html>
