<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; margin: 0; background: #f5f5f5;
    }
    .card {
      background: #fff; padding: 2.5rem; border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1); width: 100%; max-width: 420px;
    }
    h1 { margin: 0 0 0.25rem; font-size: 1.5rem; color: #1a1a2e; }
    p.sub { margin: 0 0 1.75rem; color: #666; font-size: 0.9rem; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: #333; margin-bottom: 0.35rem; }
    input {
      width: 100%; padding: 0.65rem 0.9rem; border: 1px solid #ddd;
      border-radius: 8px; font-size: 0.95rem; outline: none; margin-bottom: 1.1rem;
    }
    input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,0.15); }
    button {
      width: 100%; padding: 0.75rem; background: #4f46e5; color: #fff;
      border: none; border-radius: 8px; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover:not(:disabled) { background: #4338ca; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg {
      margin-top: 1rem; padding: 0.75rem 1rem; border-radius: 8px;
      font-size: 0.875rem; display: none;
    }
    .msg.ok  { background: #e8f5e9; color: #2e7d32; }
    .msg.err { background: #ffebee; color: #c62828; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Reset Password</h1>
    <p class="sub">Enter your new password below.</p>

    <form id="form" novalidate>
      <label for="pw">New Password</label>
      <input id="pw" type="password" placeholder="Min 8 characters" autocomplete="new-password" required minlength="8">

      <label for="pw2">Confirm Password</label>
      <input id="pw2" type="password" placeholder="Repeat password" autocomplete="new-password" required>

      <button id="btn" type="submit">Reset Password</button>
    </form>

    <div class="msg" id="msg"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token = params.get('token');

    function show(type, text) {
      const el = document.getElementById('msg');
      el.className = 'msg ' + type;
      el.textContent = text;
      el.style.display = 'block';
    }

    if (!token) {
      show('err', 'Invalid or missing reset token. Please request a new password reset link.');
      document.getElementById('btn').disabled = true;
    }

    document.getElementById('form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const pw  = document.getElementById('pw').value;
      const pw2 = document.getElementById('pw2').value;

      if (pw.length < 8) return show('err', 'Password must be at least 8 characters.');
      if (pw !== pw2)   return show('err', 'Passwords do not match.');

      const btn = document.getElementById('btn');
      btn.disabled = true;
      btn.textContent = 'Resetting…';

      try {
        const res = await fetch('/api/v1/users/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword: pw }),
        });
        const data = await res.json();

        if (data.success) {
          show('ok', 'Password reset successfully! You can now log in with your new password.');
          document.getElementById('form').style.display = 'none';
        } else {
          const msg = data.error?.message || 'Reset failed. The link may have expired.';
          show('err', msg);
          btn.disabled = false;
          btn.textContent = 'Reset Password';
        }
      } catch {
        show('err', 'Network error. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>
